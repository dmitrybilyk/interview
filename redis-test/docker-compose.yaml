services:
  redis:
    image: redis:7-alpine
    container_name: redis-playground
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Запускаємо з підтримкою збереження даних на диск (AOF)
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "8001:5540"  # Тепер твій 8001 веде на їхній 5540
    depends_on:
      - redis

volumes:
  redis_data: