spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/inventory
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  # Move this back to the left!
  jpa:
    hibernate:
      ddl-auto: update # Use 'update' or 'create'
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379