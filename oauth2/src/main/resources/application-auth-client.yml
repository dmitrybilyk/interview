spring:
  security:
    oauth2:
      client:
        registration:
          # Ця назва (keycloak) буде частиною redirect URL
          keycloak:
            client-id: spring-boot-app-client
            # Секрет, який ви скопіюєте з вкладки Credentials у Keycloak
            client-secret: 8YQ5er0Kx0dDIE4y6U7sPvT9EAOgS5nW
            # Набір дозволів, які ми просимо у Keycloak
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
        provider:
          keycloak:
            # Шлях до вашого Realm (Spring автоматично підтягне всі метадані)
            issuer-uri: http://localhost:8080/realms/my-realm

  data:
    redis:
      host: localhost
      port: 6379
    session:
      store-type: redis
      redis:
        namespace: "security:session"