<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Solr Search</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #333; }
        form { display: flex; gap: 8px; margin-bottom: 24px; }
        input[type=text] { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background: #4caf50; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #4caf50; color: #fff; }
        tr:hover { background: #f1f1f1; }
        .empty { text-align: center; color: #888; padding: 40px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; background: #e0e0e0; color: #333; }
    </style>
</head>
<body>
<div class="container">
    <h1>Solr Search</h1>
    <form action="/search" method="get">
        <input type="text" name="q" placeholder="Search..." th:value="${query}">
        <input type="hidden" name="rows" value="10">
        <button type="submit">Search</button>
    </form>

    <div th:if="${#lists.isEmpty(results)}" class="empty">
        No results found.
    </div>

    <table th:unless="${#lists.isEmpty(results)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Category</th>
            <th>Price</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${results}">
            <td th:text="${item.id}">1</td>
            <td>
                <strong th:text="${item.title}">Title</strong><br>
                <small style="color:#666" th:text="${item.description}">Description</small>
            </td>
            <td><span class="badge" th:text="${item.category}">category</span></td>
            <td th:text="${item.price} + ' $'">0.00</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
