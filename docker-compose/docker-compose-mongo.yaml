version: '3.8'

services:

  mongo:
    image: mongo:7.0
    container_name: my-mongo
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: user123
      MONGO_INITDB_ROOT_PASSWORD: pass123
      MONGO_INITDB_DATABASE: testdb
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
