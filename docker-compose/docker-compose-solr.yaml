version: '3.8'

services:
  solr:
    image: solr:9.7
    container_name: solr
    ports:
      - "8983:8983"
    environment:
      - SOLR_HEAP=512m
    volumes:
      - solr-data:/var/solr
      - ./solr-init.sh:/docker-entrypoint-initdb.d/solr-init.sh
    networks:
      - my-network

volumes:
  solr-data:

networks:
  my-network:
    driver: bridge
